<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 한국 이름</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --white: #ffffff;
      --gray-light: #e0e0e0; --gray-mid: #aaa; --gray-hint: #ddd;
      --blue: #1A4A8A; --red: #C84B31; --yellow: #C8960C; --green: #2E7D32;
      --font-display: 'Bebas Neue', sans-serif;
      --font-korean: 'Noto Sans KR', sans-serif;
    }
    html, body { min-height: 100%; background: var(--white); color: var(--black); font-family: var(--font-display); -webkit-font-smoothing: antialiased; }
    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    #mainPage, #practicePage { position: relative; z-index: 1; }

    #mainPage { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem clamp(1.5rem, 8vw, 8rem) 6rem; text-align: center; }
    .site-title { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gray-mid); margin-bottom: 5rem; opacity: 0; animation: fadeUp 0.9s 0.1s ease forwards; }
    .input-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gray-mid); margin-bottom: 0.6rem; opacity: 0; animation: fadeUp 0.9s 0.2s ease forwards; }
    #nameInput { font-family: var(--font-display); font-size: clamp(2.5rem, 7vw, 4.5rem); color: var(--black); background: transparent; border: none; border-bottom: 1.5px solid var(--gray-light); outline: none; width: 100%; max-width: 500px; padding-bottom: 0.4rem; text-align: center; letter-spacing: 0.08em; transition: border-color 0.25s; caret-color: var(--red); opacity: 0; animation: fadeUp 0.9s 0.25s ease forwards; }
    #nameInput:focus { border-bottom-color: var(--black); }
    #nameInput::placeholder { color: var(--gray-hint); }
    #nameInput:disabled { opacity: 0.35; }
    .hint { font-size: 10px; letter-spacing: 0.12em; color: var(--gray-hint); margin-top: 0.5rem; margin-bottom: 4rem; opacity: 0; animation: fadeUp 0.9s 0.3s ease forwards; }
    .loader { display: none; gap: 7px; align-items: center; justify-content: center; height: 28px; margin-bottom: 1rem; }
    .loader.active { display: flex; }
    .loader-dot { width: 7px; height: 7px; border-radius: 50%; animation: pulse 1.3s ease-in-out infinite; }
    .loader-dot:nth-child(1) { background: var(--blue); animation-delay: 0s; }
    .loader-dot:nth-child(2) { background: var(--red); animation-delay: 0.22s; }
    .loader-dot:nth-child(3) { background: var(--yellow); animation-delay: 0.44s; }
    #results { display: none; width: 100%; max-width: 640px; }
    .step-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #ccc; margin-bottom: 0.4rem; }
    #translit { font-family: var(--font-korean); font-size: clamp(1rem, 2vw, 1.3rem); color: #ccc; margin-bottom: 2rem; opacity: 0; transform: translateY(8px); transition: opacity 0.6s, transform 0.6s; }
    #translit.show { opacity: 1; transform: translateY(0); }
    #divider { width: 32px; height: 1px; background: var(--gray-light); margin: 0 auto 2rem; opacity: 0; transition: opacity 0.5s 0.35s; }
    #divider.show { opacity: 1; }
    #koreanRow { display: flex; justify-content: center; gap: clamp(0.5rem, 3vw, 1.5rem); margin-bottom: 0.8rem; }
    .char-unit { display: flex; flex-direction: column; align-items: center; opacity: 0; transform: translateY(14px); transition: opacity 0.45s, transform 0.45s; cursor: pointer; }
    .char-unit.show { opacity: 1; transform: translateY(0); }
    .hangul-char { font-family: var(--font-korean); font-weight: 900; font-size: clamp(4rem, 12vw, 7rem); line-height: 1; transition: transform 0.15s ease, opacity 0.15s ease; display: block; }
    .char-unit:hover .hangul-char { transform: scale(1.06); opacity: 0.7; }
    .sound-hint { font-size: 8px; letter-spacing: 0.1em; color: #ddd; text-transform: uppercase; margin-top: 2px; opacity: 0; transition: opacity 0.2s; font-family: var(--font-display); }
    .char-unit:hover .sound-hint { opacity: 1; }
    .hanja-block { display: flex; flex-direction: column; align-items: center; margin-top: 8px; gap: 2px; }
    .hanja-sm { font-family: var(--font-korean); font-size: 0.8rem; color: #aaa; line-height: 1; }
    .meaning-sm { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: #ccc; font-family: var(--font-display); }
    #roman { font-size: 0.75rem; letter-spacing: 0.22em; text-transform: uppercase; color: #bbb; margin-bottom: 2.5rem; font-family: var(--font-display); opacity: 0; transition: opacity 0.5s; }
    #roman.show { opacity: 1; }
    .action-btns { display: flex; gap: 1.5rem; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s; flex-wrap: wrap; }
    .action-btns.show { opacity: 1; }
    .btn-primary { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; background: var(--black); color: white; border: none; padding: 11px 24px; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: var(--red); }
    .btn-ghost { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #ccc; background: none; border: none; cursor: pointer; transition: color 0.2s; padding: 0; }
    .btn-ghost:hover { color: var(--black); }

    /* PRACTICE */
    #practicePage { display: none; min-height: 100vh; padding: 4rem clamp(1.5rem, 6vw, 6rem); max-width: 860px; margin: 0 auto; }
    .prac-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; flex-wrap: wrap; gap: 1rem; }
    .prac-title { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gray-mid); }
    .char-tabs { display: flex; gap: 0.5rem; }
    .char-tab { font-family: var(--font-korean); font-weight: 900; font-size: 2rem; cursor: pointer; padding: 0.3rem 0.8rem; border-bottom: 2px solid transparent; transition: all 0.2s; color: #ccc; }
    .char-tab.active { border-bottom-color: currentColor; }
    .prac-body { display: grid; grid-template-columns: 1fr 1fr; gap: 3.5rem; align-items: start; }
    @media (max-width: 600px) { .prac-body { grid-template-columns: 1fr; gap: 2rem; } }
    .canvas-section { display: flex; flex-direction: column; gap: 1rem; }
    .canvas-wrap { position: relative; width: 100%; aspect-ratio: 1; max-width: 300px; border: 0.5px solid #f0f0f0; }
    .canvas-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .canvas-controls { display: flex; gap: 0.8rem; }
    .btn-sm { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; padding: 7px 14px; transition: all 0.2s; border-radius: 0; }
    .btn-clear { color: #ccc; background: none; border: 0.5px solid var(--gray-light); }
    .btn-clear:hover { color: var(--black); border-color: var(--black); }
    .btn-score { color: white; background: var(--black); border: none; }
    .btn-score:hover { background: var(--blue); }
    .score-area { min-height: 32px; }
    .score-text { font-size: 10px; letter-spacing: 0.08em; color: #999; font-family: var(--font-display); margin-bottom: 6px; }
    .score-bar { height: 2px; background: #f0f0f0; overflow: hidden; }
    .score-fill { height: 100%; width: 0; transition: width 0.9s cubic-bezier(.4,0,.2,1); }
    .info-section { padding-top: 0.3rem; }
    .char-big { font-family: var(--font-korean); font-weight: 900; font-size: 6.5rem; line-height: 1; margin-bottom: 0.6rem; }
    .char-hanja { font-family: var(--font-korean); font-size: 1.1rem; color: #bbb; margin-bottom: 0.2rem; }
    .char-meaning { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #ccc; font-family: var(--font-display); margin-bottom: 2rem; }
    .strokes-title { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: #ccc; font-family: var(--font-display); margin-bottom: 0.8rem; }
    .stroke-steps { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .stroke-step { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
    .stroke-step svg { border: 0.5px solid #f0f0f0; transition: border-color 0.15s; }
    .stroke-step:hover svg { border-color: #ccc; }
    .stroke-num { font-size: 8px; color: #ccc; font-family: var(--font-display); }
    .stroke-step.current svg { border-color: #aaa; }
    .no-stroke-msg { font-size: 10px; color: #ddd; font-family: var(--font-display); letter-spacing: 0.08em; }
    .back-btn-wrap { margin-top: 2.5rem; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,80%,100%{transform:scale(0.5);opacity:0.3} 40%{transform:scale(1);opacity:1} }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div id="mainPage">
  <div class="site-title">나의 한국 이름 &mdash; My Korean Name</div>
  <div class="input-label">Enter your name</div>
  <input id="nameInput" type="text" placeholder="e.g. Dominic" autocomplete="off" spellcheck="false" />
  <div class="hint">Press Enter ↵</div>
  <div class="loader" id="loader">
    <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
  </div>
  <div id="results">
    <div class="step-label">Sounds like</div>
    <div id="translit"></div>
    <div id="divider"></div>
    <div class="step-label">Your Korean name</div>
    <div id="koreanRow"></div>
    <div id="roman"></div>
    <div class="action-btns" id="actionBtns">
      <button class="btn-primary" onclick="openPractice()">✏ Practice writing</button>
      <button class="btn-ghost" onclick="resetMain()">← Try another name</button>
    </div>
  </div>
</div>

<div id="practicePage">
  <div class="prac-header">
    <div class="prac-title">Practice — 획순 따라쓰기</div>
    <div class="char-tabs" id="charTabs"></div>
  </div>
  <div class="prac-body">
    <div class="canvas-section">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="guideCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
      </div>
      <div class="canvas-controls">
        <button class="btn-sm btn-clear" onclick="clearDraw()">Clear</button>
        <button class="btn-sm btn-score" onclick="scoreDrawing()">Check score</button>
      </div>
      <div class="score-area">
        <div class="score-text" id="scoreText"></div>
        <div class="score-bar"><div class="score-fill" id="scoreFill"></div></div>
      </div>
    </div>
    <div class="info-section">
      <div class="char-big" id="charBig"></div>
      <div class="char-hanja" id="charHanja"></div>
      <div class="char-meaning" id="charMeaning"></div>
      <div class="strokes-title">Stroke order — 획순</div>
      <div class="stroke-steps" id="strokeSteps"></div>
      <div class="back-btn-wrap">
        <button class="btn-ghost" onclick="closePractice()">← Back to my name</button>
      </div>
    </div>
  </div>
</div>

<script>
const OBANGSAEK = ['#1A4A8A','#C84B31','#C8960C','#2E7D32','#555'];
let currentChars = [], currentIdx = 0;
let isDrawing = false, lastX = 0, lastY = 0;
const synth = window.speechSynthesis;
let korVoice = null;

function loadVoices() { const v = synth.getVoices(); korVoice = v.find(x => x.lang.startsWith('ko')) || null; }
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
function speak(t) { synth.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='ko-KR'; u.rate=0.8; if(korVoice) u.voice=korVoice; synth.speak(u); }
function show(el, d) { setTimeout(() => el.classList.add('show'), d); }

function resetMain() {
  const inp = document.getElementById('nameInput');
  document.getElementById('results').style.display = 'none';
  document.getElementById('loader').classList.remove('active');
  ['translit','divider','roman'].forEach(id => document.getElementById(id).classList.remove('show'));
  document.getElementById('koreanRow').innerHTML = '';
  document.getElementById('actionBtns').classList.remove('show');
  inp.disabled = false; inp.value = ''; inp.focus();
}

function renderResult(data) {
  currentChars = data.characters;
  document.getElementById('results').style.display = 'block';
  const tr = document.getElementById('translit');
  tr.textContent = data.transliteration;
  show(tr, 100);
  show(document.getElementById('divider'), 420);
  const row = document.getElementById('koreanRow');
  data.characters.forEach((ch, i) => {
    const u = document.createElement('div');
    u.className = 'char-unit';
    u.onclick = () => speak(ch.hangul);
    u.innerHTML = `<span class="hangul-char" style="color:${OBANGSAEK[i%OBANGSAEK.length]}">${ch.hangul}</span><span class="sound-hint">tap to hear</span><div class="hanja-block"><span class="hanja-sm">${ch.hanja}</span><span class="meaning-sm">${ch.meaning}</span></div>`;
    row.appendChild(u);
    show(u, 720 + i*300);
  });
  const rom = document.getElementById('roman');
  rom.textContent = data.romanization;
  show(rom, 720 + data.characters.length*300 + 100);
  setTimeout(() => document.getElementById('actionBtns').classList.add('show'), 720 + data.characters.length*300 + 500);
}

async function handleSubmit() {
  const inp = document.getElementById('nameInput');
  const name = inp.value.trim();
  if (!name) return;
  inp.disabled = true;
  document.getElementById('loader').classList.add('active');
  document.getElementById('results').style.display = 'none';
  try {
    const res = await fetch('/.netlify/functions/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name}) });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error||'Error'); }
    const parsed = await res.json();
    document.getElementById('loader').classList.remove('active');
    renderResult(parsed);
  } catch(err) {
    document.getElementById('loader').classList.remove('active');
    inp.disabled = false;
    alert('Something went wrong 😢\n' + err.message);
  }
}

document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') handleSubmit(); });
window.addEventListener('load', () => document.getElementById('nameInput').focus());

// ── PRACTICE ──
function openPractice() {
  document.getElementById('mainPage').style.display = 'none';
  document.getElementById('practicePage').style.display = 'block';
  buildTabs();
  resizeCanvases();
  selectChar(0);
  setupDrawing();
}
function closePractice() {
  document.getElementById('practicePage').style.display = 'none';
  document.getElementById('mainPage').style.display = 'flex';
}
function buildTabs() {
  const tabs = document.getElementById('charTabs');
  tabs.innerHTML = '';
  currentChars.forEach((ch, i) => {
    const t = document.createElement('div');
    t.className = 'char-tab' + (i===0?' active':'');
    t.style.color = i===0 ? OBANGSAEK[0] : '#ccc';
    t.textContent = ch.hangul;
    t.onclick = () => selectChar(i);
    tabs.appendChild(t);
  });
}
function selectChar(i) {
  currentIdx = i;
  const ch = currentChars[i];
  const color = OBANGSAEK[i%OBANGSAEK.length];
  document.querySelectorAll('.char-tab').forEach((t,j) => {
    t.classList.toggle('active', j===i);
    t.style.color = j===i ? OBANGSAEK[j%OBANGSAEK.length] : '#ccc';
  });
  document.getElementById('charBig').textContent = ch.hangul;
  document.getElementById('charBig').style.color = color;
  document.getElementById('charHanja').textContent = ch.hanja;
  document.getElementById('charMeaning').textContent = ch.meaning;
  document.getElementById('scoreText').textContent = '';
  document.getElementById('scoreFill').style.width = '0';
  document.getElementById('scoreFill').style.background = color;
  resizeCanvases();
  drawGuide(ch.hangul, color);
  clearDraw();
  buildStrokeSteps(ch.hangul, color);
}

function resizeCanvases() {
  const wrap = document.getElementById('canvasWrap');
  const s = wrap.offsetWidth;
  ['guideCanvas','drawCanvas'].forEach(id => {
    const c = document.getElementById(id);
    c.width = s; c.height = s;
  });
}

function drawGuide(char, color) {
  const canvas = document.getElementById('guideCanvas');
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  ctx.clearRect(0,0,s,s);
  const cell = Math.floor(s/8);
  ctx.strokeStyle = 'rgba(150,130,110,0.2)';
  ctx.lineWidth = 0.5;
  for (let x=0;x<=s;x+=cell){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,s);ctx.stroke();}
  for (let y=0;y<=s;y+=cell){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(s,y);ctx.stroke();}
  ctx.strokeStyle='rgba(150,130,110,0.08)';
  for(let x=cell/2;x<=s;x+=cell){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,s);ctx.stroke();}
  for(let y=cell/2;y<=s;y+=cell){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(s,y);ctx.stroke();}
  ctx.strokeStyle='rgba(180,160,140,0.12)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(s/2,0);ctx.lineTo(s/2,s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,s/2);ctx.lineTo(s,s/2);ctx.stroke();

  // 가이드 글자 — 연하게
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = color;
  ctx.font = `900 ${Math.floor(s*0.82)}px 'Noto Sans KR', sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(char, s/2, s/2+s*0.03);
  ctx.globalAlpha = 1;
}

function buildStrokeSteps(char, color) {
  const container = document.getElementById('strokeSteps');
  container.innerHTML = '';
  const strokes = STROKES[char];
  if (!strokes) {
    const msg = document.createElement('div');
    msg.className = 'no-stroke-msg';
    msg.textContent = 'Stroke data coming soon';
    container.appendChild(msg);
    return;
  }
  strokes.forEach((_, i) => {
    const step = document.createElement('div');
    step.className = 'stroke-step' + (i===strokes.length-1?' current':'');
    step.onclick = () => highlightStroke(i, strokes, color);
    const SZ = 52;
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', SZ); svg.setAttribute('height', SZ);
    svg.setAttribute('viewBox','0 0 60 60');
    // 이전 획 — 연하게
    strokes.slice(0,i).forEach(d => {
      const p = document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',d); p.setAttribute('stroke',color);
      p.setAttribute('stroke-width','3'); p.setAttribute('stroke-linecap','round');
      p.setAttribute('stroke-linejoin','round'); p.setAttribute('fill','none');
      p.setAttribute('opacity','0.18');
      svg.appendChild(p);
    });
    // 현재 획 — 진하게
    const curr = document.createElementNS('http://www.w3.org/2000/svg','path');
    curr.setAttribute('d',strokes[i]); curr.setAttribute('stroke',color);
    curr.setAttribute('stroke-width','3.5'); curr.setAttribute('stroke-linecap','round');
    curr.setAttribute('stroke-linejoin','round'); curr.setAttribute('fill','none');
    svg.appendChild(curr);
    // 시작점 빨간 점
    const m = strokes[i].match(/M\s*([\d.]+)\s+([\d.]+)/);
    if (m) {
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',m[1]); dot.setAttribute('cy',m[2]);
      dot.setAttribute('r','3'); dot.setAttribute('fill','#C84B31');
      svg.appendChild(dot);
    }
    step.appendChild(svg);
    const num = document.createElement('div');
    num.className = 'stroke-num';
    num.textContent = i+1;
    step.appendChild(num);
    container.appendChild(step);
  });
}

function highlightStroke(i, strokes, color) {
  document.querySelectorAll('.stroke-step').forEach((s,j) => s.classList.toggle('current', j===i));
}

function clearDraw() {
  const c = document.getElementById('drawCanvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
  document.getElementById('scoreText').textContent = '';
  document.getElementById('scoreFill').style.width = '0';
}

function scoreDrawing() {
  const g = document.getElementById('guideCanvas');
  const d = document.getElementById('drawCanvas');
  const s = g.width;
  const gd = g.getContext('2d').getImageData(0,0,s,s).data;
  const dd = d.getContext('2d').getImageData(0,0,s,s).data;

  // 가이드 글자 픽셀 & 드로잉 픽셀 수집
  let guidePixels=0, drawPixels=0, overlap=0, outside=0;
  for (let i=3; i<gd.length; i+=4) {
    const gOn = gd[i] > 20;
    const dOn = dd[i] > 20;
    if (gOn) guidePixels++;
    if (dOn) {
      drawPixels++;
      if (gOn) overlap++;
      else outside++;
    }
  }
  if (drawPixels === 0) {
    document.getElementById('scoreText').textContent = 'Draw something first!';
    return;
  }

  // 1. 커버리지: 가이드 글자를 얼마나 채웠나 (0~1)
  const coverage = guidePixels > 0 ? overlap / guidePixels : 0;

  // 2. 정확도: 그린 획이 글자 안에 있는 비율 (0~1)
  const precision = drawPixels > 0 ? overlap / drawPixels : 0;

  // 3. 획 양 체크: 너무 많이 그리거나 너무 적게 그리면 감점
  const ratio = drawPixels / Math.max(guidePixels, 1);
  // 이상적 비율 0.4~1.6 (붓 두께 감안)
  const ratioScore = ratio < 0.15 ? ratio / 0.15        // 너무 적게
                   : ratio > 2.5  ? Math.max(0, 1 - (ratio-2.5)*0.3) // 너무 많이
                   : 1;

  // 4. 최종 점수 — 엄격하게
  // coverage 50% + precision 35% + ratio 15%
  const raw = (coverage * 0.50 + precision * 0.35 + ratioScore * 0.15);
  // 보정 없이 그대로 — 80점 이상 받으려면 진짜 잘 써야 함
  const score = Math.round(Math.min(raw * 100, 100));

  const color = OBANGSAEK[currentIdx%OBANGSAEK.length];
  document.getElementById('scoreFill').style.background = color;
  document.getElementById('scoreFill').style.width = score + '%';

  const msgs = [
    'Start over — 처음부터 다시!',
    'Keep practicing — 연습이 필요해요',
    'Not quite — 조금 더 해봐요',
    'Getting there — 잘하고 있어요',
    'Good job — 잘했어요!',
    'Perfect — 완벽해요! 🎉'
  ];
  const msgIdx = score>=90?5 : score>=75?4 : score>=55?3 : score>=35?2 : score>=15?1 : 0;
  document.getElementById('scoreText').textContent = `${score} — ${msgs[msgIdx]}`;
}

function getPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  if(e.touches) return {x:(e.touches[0].clientX-rect.left)*sx,y:(e.touches[0].clientY-rect.top)*sy};
  return {x:(e.clientX-rect.left)*sx,y:(e.clientY-rect.top)*sy};
}

function setupDrawing() {
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle='#0a0a0a'; ctx.lineWidth=18; ctx.lineCap='round'; ctx.lineJoin='round';
  const start = e => { e.preventDefault(); isDrawing=true; const p=getPos(e,canvas); lastX=p.x; lastY=p.y; ctx.beginPath(); ctx.arc(lastX,lastY,9,0,Math.PI*2); ctx.fillStyle='#0a0a0a'; ctx.fill(); };
  const draw = e => { e.preventDefault(); if(!isDrawing) return; const p=getPos(e,canvas); ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke(); lastX=p.x; lastY=p.y; };
  const stop = e => { e.preventDefault(); isDrawing=false; };
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',draw);
  canvas.addEventListener('mouseup',stop); canvas.addEventListener('mouseleave',stop);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',draw,{passive:false});
  canvas.addEventListener('touchend',stop,{passive:false});
}

// ── 단청 배경 애니메이션 ──
(function() {

  const ctx = canvas.getContext('2d');
  const C = { blue:'#1A4A8A', red:'#C84B31', yellow:'#C8960C', green:'#2E7D32', pink:'#c45a7a', teal:'#1a7a6a' };
  const ALL = Object.values(C);

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

  // 단청 구름무늬 (운문) — 전통 소용돌이 구름
  function drawUnmun(ctx, x, y, size, color, t) {
    ctx.save();
    ctx.globalAlpha = 0.1;
    ctx.strokeStyle = color;
    ctx.fillStyle = color;

    // 구름 몸통 — 겹쳐진 원호들
    const s = size;
    const wobble = Math.sin(t * 0.5) * 2;

    // 바깥 구름 테두리
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x + wobble, y, s * 0.5, Math.PI, 0);
    ctx.arc(x + s * 0.35 + wobble, y - s * 0.15, s * 0.22, Math.PI * 1.1, -0.1);
    ctx.arc(x - s * 0.35 + wobble, y - s * 0.15, s * 0.22, Math.PI * 1.9, 0.1);
    ctx.stroke();

    // 안쪽 소용돌이 (나선)
    ctx.globalAlpha = 0.08;
    ctx.lineWidth = 1;
    for (let side of [-1, 1]) {
      ctx.beginPath();
      for (let i = 0; i < 40; i++) {
        const a = i * 0.28;
        const r = s * 0.08 + i * s * 0.006;
        const px = x + side * s * 0.28 + Math.cos(a) * r + wobble;
        const py = y - s * 0.1 + Math.sin(a) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
    }

    // 속 채우기 (연하게)
    ctx.globalAlpha = 0.04;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(x + wobble, y - s * 0.05, s * 0.48, s * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // 단청 꽃무늬 (연화문) — 연꽃
  function drawYeonhwa(ctx, x, y, size, color, t) {
    ctx.save();
    ctx.globalAlpha = 0.09;
    ctx.strokeStyle = color;
    const s = size;
    const rot = t * 0.008;

    ctx.lineWidth = 1;
    // 꽃잎 8개
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 + rot;
      const px = x + Math.cos(a) * s * 0.38;
      const py = y + Math.sin(a) * s * 0.38;
      ctx.beginPath();
      ctx.ellipse(
        x + Math.cos(a) * s * 0.22,
        y + Math.sin(a) * s * 0.22,
        s * 0.18, s * 0.1,
        a, 0, Math.PI * 2
      );
      ctx.stroke();
    }
    // 바깥 원
    ctx.beginPath(); ctx.arc(x, y, s * 0.5, 0, Math.PI * 2); ctx.stroke();
    // 중심 원
    ctx.globalAlpha = 0.07;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(x, y, s * 0.12, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // 단청 뇌문 (번개/격자 무늬)
  function drawNoemun(ctx, x, y, size, color) {
    ctx.save();
    ctx.globalAlpha = 0.07;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.2;
    const s = size * 0.4;

    // ㄱ자 반복 패턴
    const steps = [
      [0,0,s,0], [s,0,s,-s], [s,-s,2*s,-s], [2*s,-s,2*s,0],
      [2*s,0,3*s,0], [3*s,0,3*s,s], [3*s,s,2*s,s], [2*s,s,2*s,2*s],
    ];
    ctx.beginPath();
    steps.forEach(([x1,y1,x2,y2]) => {
      ctx.moveTo(x - s*1.5 + x1, y - s*0.5 + y1);
      ctx.lineTo(x - s*1.5 + x2, y - s*0.5 + y2);
    });
    ctx.stroke();
    ctx.restore();
  }

  // 단청 만자문 (卍)
  function drawManja(ctx, x, y, size, color, rot) {
    ctx.save();
    ctx.globalAlpha = 0.07;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    const s = size * 0.35;
    ctx.translate(x, y);
    ctx.rotate(rot);

    ctx.beginPath();
    // 卍 모양
    ctx.moveTo(0, -s*1.5); ctx.lineTo(0, s*1.5);
    ctx.moveTo(-s*1.5, 0); ctx.lineTo(s*1.5, 0);
    // 네 끝 꺾임
    ctx.moveTo(0, -s*1.5); ctx.lineTo(s*0.8, -s*1.5);
    ctx.moveTo(s*1.5, 0); ctx.lineTo(s*1.5, -s*0.8);
    ctx.moveTo(0, s*1.5); ctx.lineTo(-s*0.8, s*1.5);
    ctx.moveTo(-s*1.5, 0); ctx.lineTo(-s*1.5, s*0.8);
    ctx.stroke();
    ctx.restore();
  }

  // 연(전통 방패연)
  function drawKite(k, t) {
    const bob = Math.sin(t * 0.5 + k.phase) * 6;
    const sway = Math.sin(t * 0.35 + k.phase) * 0.1;
    ctx.save();
    ctx.translate(k.x, k.y + bob);
    ctx.rotate(sway - 0.2);
    ctx.globalAlpha = 0.6;

    const w = k.size, h = k.size * 1.4;

    // 방패연 몸통 — 직사각형에 가운데 구멍
    ctx.fillStyle = k.c1;
    ctx.fillRect(-w, -h, w * 2, h * 2);

    // 중앙 원형 구멍
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(0, 0, w * 0.55, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';

    // 테두리 + 중심선
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = k.c2;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-w, -h, w * 2, h * 2);
    ctx.beginPath(); ctx.moveTo(0, -h); ctx.lineTo(0, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-w, 0); ctx.lineTo(w, 0); ctx.stroke();

    // 구멍 테두리
    ctx.beginPath(); ctx.arc(0, 0, w * 0.55, 0, Math.PI * 2); ctx.stroke();

    ctx.restore();

    // 연실 — 바람에 흔들림
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    const tailY = k.y + bob + k.size * 1.4;
    ctx.moveTo(k.x, tailY);
    const cx1 = k.x + Math.sin(t * 0.3 + k.phase) * 20;
    const cy1 = tailY + k.tailLen * 0.4;
    const cx2 = k.x + Math.sin(t * 0.5 + k.phase) * 30;
    const cy2 = tailY + k.tailLen * 0.75;
    const ex = k.x + Math.sin(t * 0.6 + k.phase) * 40;
    const ey = tailY + k.tailLen;
    ctx.bezierCurveTo(cx1, cy1, cx2, cy2, ex, ey);
    ctx.stroke();

    // 꼬리 고리 장식
    for (let i = 0; i < 5; i++) {
      const ri = i / 4;
      const rx = k.x + Math.sin(t * 0.5 + k.phase + i) * 12 * ri;
      const ry = tailY + k.tailLen * (0.2 + i * 0.16);
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = i % 2 === 0 ? k.c1 : k.c2;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(rx, ry, 6, 4, Math.sin(t + i) * 0.5, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  // 파도 (수파문)
  function drawWaves(t) {
    const W = canvas.width, H = canvas.height;
    [
      [H * 0.87, 6, 0.007, 0.3, C.blue,   0.06],
      [H * 0.90, 4, 0.011, 0.5, C.teal,   0.05],
      [H * 0.93, 5, 0.009, 0.25, C.yellow, 0.04],
    ].forEach(([wy, amp, freq, spd, col, a]) => {
      ctx.save();
      ctx.globalAlpha = a;
      ctx.strokeStyle = col;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let x = 0; x <= W; x += 2) {
        const y = wy + Math.sin(x * freq + t * spd) * amp;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.restore();
    });
  }

  // 무늬 객체들 초기화
  let motifs = [];
  function initMotifs() {
    motifs = [];
    const W = canvas.width, H = canvas.height;
    const types = ['unmun','yeonhwa','noemun','manja'];
    for (let i = 0; i < 28; i++) {
      motifs.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 24 + Math.random() * 36,
        color: ALL[Math.floor(Math.random() * ALL.length)],
        type: types[Math.floor(Math.random() * types.length)],
        vy: -0.12 - Math.random() * 0.18,
        vx: (Math.random() - 0.5) * 0.08,
        rot: Math.random() * Math.PI * 2,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }
  initMotifs();
  window.addEventListener('resize', () => { resize(); initMotifs(); });

  // 연 초기화
  const kites = [
    { x: 180,  y: 120, vx: 0.35, size: 20, c1: C.red,    c2: C.blue,   phase: 0,   tailLen: 110 },
    { x: 650,  y: 90,  vx: 0.28, size: 16, c1: C.blue,   c2: C.yellow, phase: 2.0, tailLen: 90  },
    { x: 1050, y: 160, vx: 0.42, size: 22, c1: C.yellow, c2: C.green,  phase: 4.0, tailLen: 120 },
  ];

  let t = 0;
  function animate() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // 단청 무늬
    motifs.forEach(m => {
      m.x += m.vx;
      m.y += m.vy;
      m.rot += 0.003;
      if (m.y < -m.size * 2) { m.y = H + m.size; m.x = Math.random() * W; }
      if (m.x < -60) m.x = W + 60;
      if (m.x > W + 60) m.x = -60;

      ctx.save();
      ctx.translate(m.x, m.y);
      ctx.rotate(m.rot);
      ctx.translate(-m.x, -m.y);

      if (m.type === 'unmun')   drawUnmun(ctx, m.x, m.y, m.size, m.color, t + m.phase);
      else if (m.type === 'yeonhwa') drawYeonhwa(ctx, m.x, m.y, m.size, m.color, t);
      else if (m.type === 'noemun')  drawNoemun(ctx, m.x, m.y, m.size, m.color);
      else                           drawManja(ctx, m.x, m.y, m.size, m.color, m.rot);

      ctx.restore();
    });

    // 연
    kites.forEach(k => {
      k.x += k.vx;
      if (k.x > W + 80) { k.x = -60; k.y = 60 + Math.random() * H * 0.3; }
      drawKite(k, t);
    });

    drawWaves(t);
    t += 0.016;
    requestAnimationFrame(animate);
  }

})();

  const C = { blue:'#1A4A8A', red:'#C84B31', yellow:'#C8960C', green:'#2E7D32', pink:'#d4607a', teal:'#1a7a6a', purple:'#6a3a9a' };
  const ALL = Object.values(C);

  // ── 패턴 타일 (민화 모티프) ──
  function drawPatternTile(ctx, x, y, size, color, type, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 1.2;
    const h = size/2;

    if (type === 0) {
      // 마름모 + 내부 십자
      ctx.beginPath(); ctx.moveTo(x,y-h); ctx.lineTo(x+h,y); ctx.lineTo(x,y+h); ctx.lineTo(x-h,y); ctx.closePath(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,y-h*0.5); ctx.lineTo(x,y+h*0.5); ctx.moveTo(x-h*0.5,y); ctx.lineTo(x+h*0.5,y); ctx.stroke();
    } else if (type === 1) {
      // 꽃 모양 (6각)
      for (let i=0;i<6;i++) {
        const a = (i/6)*Math.PI*2;
        const bx = x+Math.cos(a)*h*0.5, by = y+Math.sin(a)*h*0.5;
        ctx.beginPath(); ctx.arc(bx, by, h*0.28, 0, Math.PI*2); ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(x, y, h*0.2, 0, Math.PI*2); ctx.fill();
    } else if (type === 2) {
      // 빗금 격자
      for (let i=-1;i<=1;i++) {
        ctx.beginPath(); ctx.moveTo(x-h, y+i*h*0.6); ctx.lineTo(x+h, y+i*h*0.6); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x+i*h*0.6, y-h); ctx.lineTo(x+i*h*0.6, y+h); ctx.stroke();
      }
    } else if (type === 3) {
      // 소용돌이 (단청 구름)
      ctx.beginPath();
      for (let i=0;i<60;i++) {
        const a = i*0.22, r = h*0.1+i*h*0.012;
        const px = x+Math.cos(a)*r, py = y+Math.sin(a)*r;
        i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      }
      ctx.stroke();
    } else if (type === 4) {
      // 삼각 패턴
      ctx.beginPath(); ctx.moveTo(x-h,y+h); ctx.lineTo(x,y-h); ctx.lineTo(x+h,y+h); ctx.closePath(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-h*0.5,y); ctx.lineTo(x+h*0.5,y); ctx.stroke();
    } else if (type === 5) {
      // 동그라미 겹치기
      ctx.beginPath(); ctx.arc(x,y,h*0.7,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x,y,h*0.4,0,Math.PI*2); ctx.fill();
    } else if (type === 6) {
      // 물결 (파도)
      ctx.beginPath();
      for (let i=0;i<=20;i++) {
        const px = x-h+i*h*0.1;
        const py = y+Math.sin(i*0.6)*h*0.4;
        i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      }
      ctx.stroke();
    } else {
      // 별 모양
      for (let i=0;i<8;i++) {
        const a = (i/8)*Math.PI*2;
        const r = i%2===0 ? h*0.8 : h*0.35;
        const px = x+Math.cos(a)*r, py = y+Math.sin(a)*r;
        i===0 ? ctx.beginPath() && ctx.moveTo(px,py) : ctx.lineTo(px,py);
        if (i===0) { ctx.beginPath(); ctx.moveTo(px,py); }
        else ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.stroke();
    }
    ctx.restore();
  }

  // 패턴 타일 배치
  const tiles = [];
  function initTiles() {
    tiles.length = 0;
    const W = canvas.width, H = canvas.height;
    const count = Math.floor(W*H/18000);
    for (let i=0;i<count;i++) {
      tiles.push({
        x: Math.random()*W,
        y: Math.random()*H,
        size: 18+Math.random()*32,
        color: ALL[Math.floor(Math.random()*ALL.length)],
        type: Math.floor(Math.random()*8),
        alpha: 0.04+Math.random()*0.07,
        vx: (Math.random()-0.5)*0.3,
        vy: -0.05-Math.random()*0.2,
        rot: Math.random()*Math.PI*2,
        rotV: (Math.random()-0.5)*0.005,
      });
    }
  }
  initTiles();
  window.addEventListener('resize', initTiles);

  // 연(kite)
  const kites = Array.from({length:3}, (_, i) => ({
    x: (i+0.5) * (window.innerWidth/3),
    y: 80+Math.random()*200,
    vx: 0.3+Math.random()*0.3,
    vy: -0.05-Math.random()*0.1,
    size: 22+Math.random()*14,
    c1: ALL[i*2%ALL.length],
    c2: ALL[(i*2+1)%ALL.length],
    phase: i*2.1,
    tailLen: 90+Math.random()*60,
  }));

  function drawKite(k, t) {
    const bob = Math.sin(t*0.6+k.phase)*5;
    const sway = Math.sin(t*0.4+k.phase)*0.12;
    const x=k.x, y=k.y+bob, s=k.size;
    ctx.save();
    ctx.translate(x,y); ctx.rotate(sway-0.25);
    ctx.globalAlpha=0.55;

    // 4등분 마름모
    [[0,-s,s,0,k.c1],[s,0,0,s*0.7,k.c2],[0,s*0.7,-s,0,k.c1],[-s,0,0,-s,k.c2]].forEach(([x1,y1,x2,y2,c])=>{
      ctx.fillStyle=c; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(x1,y1); ctx.lineTo(x2,y2); ctx.closePath(); ctx.fill();
    });
    // 테두리 + 중심선
    ctx.globalAlpha=0.5; ctx.strokeStyle='#fff'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(s,0); ctx.lineTo(0,s*0.7); ctx.lineTo(-s,0); ctx.closePath(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-s); ctx.lineTo(0,s*0.7); ctx.moveTo(-s,0); ctx.lineTo(s,0); ctx.stroke();
    ctx.restore();

    // 연실
    ctx.save(); ctx.globalAlpha=0.2; ctx.strokeStyle='#aaa'; ctx.lineWidth=0.7;
    ctx.beginPath(); ctx.moveTo(x,y+s*0.7);
    const cx1=x+Math.sin(t*0.3+k.phase)*18, cy1=y+k.tailLen*0.4;
    const cx2=x+Math.sin(t*0.4+k.phase)*28, cy2=y+k.tailLen*0.75;
    const ex=x+Math.sin(t*0.5+k.phase)*36, ey=y+k.tailLen;
    ctx.bezierCurveTo(cx1,cy1,cx2,cy2,ex,ey); ctx.stroke();
    // 꼬리 리본
    for (let i=0;i<4;i++) {
      const ri=i/3;
      const rx=x+(cx1*ri+ex*(1-ri)*0.3)+Math.sin(t*0.7+i)*6;
      const ry=y+k.tailLen*(0.25+i*0.2);
      ctx.globalAlpha=0.4; ctx.fillStyle=i%2===0?k.c1:k.c2;
      ctx.beginPath(); ctx.ellipse(rx,ry,5,3,Math.sin(t+i)*0.6,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // 파도
  function drawWaves(t) {
    const W=canvas.width, H=canvas.height;
    [[H*0.88,7,0.007,0.35,C.blue,0.06],[H*0.91,5,0.011,0.55,C.yellow,0.05],[H*0.94,4,0.009,0.28,C.teal,0.05]].forEach(([wy,amp,freq,spd,col,a])=>{
      ctx.save(); ctx.globalAlpha=a; ctx.strokeStyle=col; ctx.lineWidth=1.5;
      ctx.beginPath();
      for (let x=0;x<=W;x+=2) {
        const y=wy+Math.sin(x*freq+t*spd)*amp;
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke(); ctx.restore();
    });
  }

  let t=0;
  function animate() {
    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);

    // 패턴 타일
    tiles.forEach(tile => {
      tile.x += tile.vx;
      tile.y += tile.vy;
      tile.rot += tile.rotV;
      if (tile.y < -tile.size*2) { tile.y=H+tile.size; tile.x=Math.random()*W; }
      if (tile.x < -tile.size*2) tile.x=W+tile.size;
      if (tile.x > W+tile.size*2) tile.x=-tile.size;

      ctx.save();
      ctx.translate(tile.x, tile.y);
      ctx.rotate(tile.rot);
      ctx.translate(-tile.x, -tile.y);
      drawPatternTile(ctx, tile.x, tile.y, tile.size, tile.color, tile.type, tile.alpha);
      ctx.restore();
    });

    // 연
    kites.forEach(k => {
      k.x += k.vx;
      k.y += k.vy * Math.sin(t*0.02+k.phase)*0.3;
      if (k.x > W+100) { k.x=-80; k.y=60+Math.random()*H*0.35; }
      drawKite(k, t);
    });

    drawWaves(t);
    t += 0.018;
    requestAnimationFrame(animate);
  }
  animate();
})();


</script>
</body>
</html>
